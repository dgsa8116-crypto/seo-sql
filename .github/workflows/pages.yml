name: Build SEO and Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "25 19 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static website and update SEO outputs
        env:
          PUBLIC_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          REGISTER_REDIRECT_URL: ${{ vars.REGISTER_REDIRECT_URL }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
        run: node scripts/build.mjs

      - name: Validate SEO and static output
        run: node scripts/validate.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
